version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: verisphere-db
    environment:
      POSTGRES_DB: verisphere
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: local_secret_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: verisphere-api
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://postgres:local_secret_password@database:5432/verisphere?schema=public
      - NODE_ENV=production
      - GEMINI_API_KEY=your-gemini-key
      - PORT=4000
    depends_on:
      database:
        condition: service_healthy

  web:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.web
    container_name: verisphere-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NODE_ENV=production
    depends_on:
      - api

volumes:
  pgdata:
